name: Unreal Engine Update Tracker

on:
  workflow_dispatch:
    inputs:
      commit_scan_limit:
        description: 'Number of recent commits to scan. If empty, the script defaults to the last 24 hours.'
        required: false
        default: ''
      ue_branches:
        description: 'Comma-separated branches to track (e.g. ue5-main,ue6-main). Default: ue5-main,ue6-main'
        required: false
        default: ''
      report_language:
        description: 'Language for the report (e.g., Japanese, English). Default: Japanese'
        required: false
        default: ''
      discussion_category:
        description: 'GitHub Discussion category to post to. Default: Daily Reports'
        required: false
        default: ''
      gemini_model:
        description: 'The Gemini model to use for analysis. Default: gemini-3.5-flash'
        required: false
        default: ''
      slack_webhook_url:
        description: 'Slack Webhook URL for notifications. Overrides secret.'
        required: false
        default: ''
      slack_channel:
        description: 'Slack channel to post to. Overrides secret.'
        required: false
        default: ''
      discord_webhook_url:
        description: 'Discord Webhook URL for notifications. Overrides secret.'
        required: false
        default: ''
  schedule:
    # Runs every day at 23:00 UTC (which is 8:00 AM JST).
    # NOTE: there is no persisted state — each run scans the last 24 hours
    # (see fetch_new_commits in scripts/main.py). If GitHub delays or skips a
    # scheduled run, commits in the gap can be missed; a re-run can duplicate a
    # report. This is an intentional trade-off to keep the tool serverless.
    - cron: '0 23 * * *'

jobs:
  run-update-check:
    runs-on: ubuntu-latest
    # Run on schedule or if manually triggered by the repository owner
    if: github.event_name == 'schedule' || github.actor == github.repository_owner
    permissions:
      contents: read       # Only needs to check out this repo; posting uses external PATs/webhooks.

    env:
      # --- Secrets (Must be configured in repository settings) ---
      UE_REPO_PAT: ${{ secrets.UE_REPO_PAT }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      # GitHub Discussion posting is opt-in: set BOTH DISCUSSION_REPO (target repo,
      # e.g. owner/name) and DISCUSSION_REPO_PAT (a PAT with 'discussions: write').
      # The repo is intentionally NOT defaulted to github.repository and GITHUB_TOKEN
      # is NOT used as a fallback, to avoid auto-posting UE info to a possibly-public
      # repo. Leave both unset to skip Discussions and use Slack/Discord only.
      DISCUSSION_REPO: ${{ secrets.DISCUSSION_REPO }}
      DISCUSSION_REPO_PAT: ${{ secrets.DISCUSSION_REPO_PAT }}

      # --- Dynamic Configuration ---
      # The script will use the following environment variables.
      # Priority: Manual Input > Repository Variable > Workflow Default
      # Branches to track. vars.UE_BRANCH is kept as a fallback so existing
      # single-branch setups (which configured UE_BRANCH) keep working.
      UE_BRANCHES: ${{ github.event.inputs.ue_branches || vars.UE_BRANCHES || vars.UE_BRANCH || 'ue5-main,ue6-main' }}
      REPORT_LANGUAGE: ${{ github.event.inputs.report_language || vars.REPORT_LANGUAGE || 'Japanese' }}
      REPORT_TIMEZONE: ${{ vars.REPORT_TIMEZONE || 'Asia/Tokyo' }}
      GEMINI_MODEL: ${{ github.event.inputs.gemini_model || vars.GEMINI_MODEL || 'gemini-3.5-flash' }}
      DISCUSSION_CATEGORY: ${{ github.event.inputs.discussion_category || vars.DISCUSSION_CATEGORY || 'Daily Reports' }}
      COMMIT_SCAN_LIMIT: ${{ github.event.inputs.commit_scan_limit }}
      SLACK_WEBHOOK_URL: ${{ github.event.inputs.slack_webhook_url || secrets.SLACK_WEBHOOK_URL }}
      SLACK_CHANNEL: ${{ github.event.inputs.slack_channel || secrets.SLACK_CHANNEL }}
      DISCORD_WEBHOOK_URL: ${{ github.event.inputs.discord_webhook_url || secrets.DISCORD_WEBHOOK_URL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run update check script
        run: python scripts/main.py