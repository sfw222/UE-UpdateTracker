name: Unreal Engine 更新追踪

on:
  workflow_dispatch:
    inputs:
      commit_scan_limit:
        description: '扫描的近期提交数量。留空则默认扫描最近24小时。'
        required: false
        default: ''
      ue_branches:
        description: '逗号分隔的追踪分支（如 ue5-main,ue6-main）。默认: ue5-main,ue6-main'
        required: false
        default: ''
      report_language:
        description: '日报语言（如 Chinese, Japanese, English）。默认: Chinese'
        required: false
        default: ''
      discussion_category:
        description: 'GitHub Discussion 投稿分类。默认: 日报'
        required: false
        default: ''
      gemini_model:
        description: '分析使用的模型。默认: glm-4.7-flash（智谱 GLM）'
        required: false
        default: ''
      slack_webhook_url:
        description: 'Slack 通知的 Webhook URL。会覆盖 Secret 中的值。'
        required: false
        default: ''
      slack_channel:
        description: 'Slack 通知的目标频道。会覆盖 Secret 中的值。'
        required: false
        default: ''
      discord_webhook_url:
        description: 'Discord 通知的 Webhook URL。会覆盖 Secret 中的值。'
        required: false
        default: ''
  schedule:
    # 每天 23:00 UTC（北京时间 7:00）自动执行。
    # 注意：无持久化状态，每次仅扫描最近24小时的提交。若 GitHub 延迟或跳过某次定时执行，
    # 间隔内的提交可能被遗漏；重新触发可能导致日报重复。这是保持工具 Serverless 的有意权衡。
    - cron: '0 23 * * *'

jobs:
  run-update-check:
    runs-on: ubuntu-latest
    # Run on schedule or if manually triggered by the repository owner
    if: github.event_name == 'schedule' || github.actor == github.repository_owner
    permissions:
      contents: read       # Only needs to check out this repo; posting uses external PATs/webhooks.

    env:
      # --- Secrets (Must be configured in repository settings) ---
      UE_REPO_PAT: ${{ secrets.UE_REPO_PAT }}
      ZHIPU_API_KEY: ${{ secrets.ZHIPU_API_KEY || secrets.GEMINI_API_KEY }}
      # GitHub Discussion posting is opt-in: set BOTH DISCUSSION_REPO (target repo,
      # e.g. owner/name) and DISCUSSION_REPO_PAT (a PAT with 'discussions: write').
      # The repo is intentionally NOT defaulted to github.repository and GITHUB_TOKEN
      # is NOT used as a fallback, to avoid auto-posting UE info to a possibly-public
      # repo. Leave both unset to skip Discussions and use Slack/Discord only.
      DISCUSSION_REPO: ${{ secrets.DISCUSSION_REPO }}
      DISCUSSION_REPO_PAT: ${{ secrets.DISCUSSION_REPO_PAT }}

      # --- Dynamic Configuration ---
      # The script will use the following environment variables.
      # Priority: Manual Input > Repository Variable > Workflow Default
      # Branches to track. vars.UE_BRANCH is kept as a fallback so existing
      # single-branch setups (which configured UE_BRANCH) keep working.
      UE_BRANCHES: ${{ github.event.inputs.ue_branches || vars.UE_BRANCHES || vars.UE_BRANCH || 'ue5-main,ue6-main' }}
      REPORT_LANGUAGE: ${{ github.event.inputs.report_language || vars.REPORT_LANGUAGE || 'Chinese' }}
      REPORT_TIMEZONE: ${{ vars.REPORT_TIMEZONE || 'Asia/Tokyo' }}
      ZHIPU_MODEL: ${{ github.event.inputs.gemini_model || vars.ZHIPU_MODEL || vars.GEMINI_MODEL || 'glm-4.7-flash' }}
      DISCUSSION_CATEGORY: ${{ github.event.inputs.discussion_category || vars.DISCUSSION_CATEGORY || '日报' }}
      COMMIT_SCAN_LIMIT: ${{ github.event.inputs.commit_scan_limit }}
      SLACK_WEBHOOK_URL: ${{ github.event.inputs.slack_webhook_url || secrets.SLACK_WEBHOOK_URL }}
      SLACK_CHANNEL: ${{ github.event.inputs.slack_channel || secrets.SLACK_CHANNEL }}
      DISCORD_WEBHOOK_URL: ${{ github.event.inputs.discord_webhook_url || secrets.DISCORD_WEBHOOK_URL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run update check script
        run: python scripts/main.py