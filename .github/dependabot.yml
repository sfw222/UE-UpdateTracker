# .github/dependabot.yml
version: 2
updates:
  # 维护 Python/pip 的依赖关系
  - package-ecosystem: "pip"
    # requirements.txt 所在的根目录
    directory: "/"
    # 更新检查频率（每周一）
    schedule:
      interval: "weekly"
      day: "monday"
    # Dependabot 创建的 Pull Request 标签
    labels:
      - "dependencies"
    # 自定义提交消息前缀
    commit-message:
      prefix: "chore(deps)"